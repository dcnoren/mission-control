services:
  mission-control:
    image: ghcr.io/dcnoren/mission-control:latest
    ports:
      - "8765:8765"
    volumes:
      - mc-data:/app/data
    environment:
      - HA_URL=http://homeassistant.local:8123
      - HA_TOKEN=your_long_lived_access_token
      - GEMINI_API_KEY=AIza...
      - SERVER_URL=http://your-docker-host-ip:8765
    restart: unless-stopped

volumes:
  mc-data:
