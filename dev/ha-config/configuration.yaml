homeassistant:
  name: Mission Control Dev
  unit_system: imperial
  time_zone: America/Chicago

default_config:

# --- Backing state for all template entities ---
input_boolean:
  # Kitchen
  kitchen_ceiling_light:
    name: Kitchen Ceiling Light
  kitchen_under_cabinet:
    name: Kitchen Under Cabinet
  coffee_maker:
    name: Coffee Maker
  kitchen_window_contact:
    name: Kitchen Window
  # Living Room
  living_room_lamp:
    name: Living Room Lamp
  living_room_ceiling_light:
    name: Living Room Ceiling
  living_room_blinds:
    name: Living Room Blinds
  living_room_fan:
    name: Living Room Fan
  decorative_lights:
    name: Decorative Lights
  # Master Bedroom
  master_bedroom_light:
    name: Master Bedroom Light
  master_bedroom_fan:
    name: Master Bedroom Fan
  # Kids Room
  kids_room_light:
    name: Kids Room Light
  kids_room_night_light:
    name: Kids Room Night Light
  kids_room_motion:
    name: Kids Room Motion
  # Office
  office_desk_lamp:
    name: Office Desk Lamp
  office_monitor:
    name: Office Monitor
  # Garage
  garage_light:
    name: Garage Light
  garage_door:
    name: Garage Door
  garage_heater:
    name: Garage Heater
  garage_motion:
    name: Garage Motion
  # Hallway
  hallway_light:
    name: Hallway Light
  front_door_lock:
    name: Front Door Lock
  back_door_lock:
    name: Back Door Lock
  front_door_contact:
    name: Front Door
  back_door_contact:
    name: Back Door
  hallway_window:
    name: Hallway Window

# --- Template entities (registered in entity registry, can be assigned to areas) ---
template:
  # Lights
  - light:
      - name: "Kitchen Ceiling Light"
        unique_id: kitchen_ceiling_light
        state: "{{ states('input_boolean.kitchen_ceiling_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.kitchen_ceiling_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.kitchen_ceiling_light
      - name: "Kitchen Under Cabinet"
        unique_id: kitchen_under_cabinet
        state: "{{ states('input_boolean.kitchen_under_cabinet') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.kitchen_under_cabinet
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.kitchen_under_cabinet
      - name: "Living Room Lamp"
        unique_id: living_room_lamp
        state: "{{ states('input_boolean.living_room_lamp') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.living_room_lamp
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.living_room_lamp
      - name: "Living Room Ceiling"
        unique_id: living_room_ceiling_light
        state: "{{ states('input_boolean.living_room_ceiling_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.living_room_ceiling_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.living_room_ceiling_light
      - name: "Master Bedroom Light"
        unique_id: master_bedroom_light
        state: "{{ states('input_boolean.master_bedroom_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.master_bedroom_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.master_bedroom_light
      - name: "Kids Room Light"
        unique_id: kids_room_light
        state: "{{ states('input_boolean.kids_room_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.kids_room_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.kids_room_light
      - name: "Kids Room Night Light"
        unique_id: kids_room_night_light
        state: "{{ states('input_boolean.kids_room_night_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.kids_room_night_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.kids_room_night_light
      - name: "Office Desk Lamp"
        unique_id: office_desk_lamp
        state: "{{ states('input_boolean.office_desk_lamp') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.office_desk_lamp
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.office_desk_lamp
      - name: "Garage Light"
        unique_id: garage_light
        state: "{{ states('input_boolean.garage_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.garage_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.garage_light
      - name: "Hallway Light"
        unique_id: hallway_light
        state: "{{ states('input_boolean.hallway_light') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.hallway_light
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.hallway_light

  # Switches
  - switch:
      - name: "Coffee Maker"
        unique_id: coffee_maker
        state: "{{ states('input_boolean.coffee_maker') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.coffee_maker
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.coffee_maker
      - name: "Decorative Lights"
        unique_id: decorative_lights
        state: "{{ states('input_boolean.decorative_lights') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.decorative_lights
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.decorative_lights
      - name: "Office Monitor"
        unique_id: office_monitor
        state: "{{ states('input_boolean.office_monitor') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.office_monitor
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.office_monitor
      - name: "Garage Heater"
        unique_id: garage_heater
        state: "{{ states('input_boolean.garage_heater') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.garage_heater
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.garage_heater

  # Fans
  - fan:
      - name: "Living Room Fan"
        unique_id: living_room_fan
        state: "{{ states('input_boolean.living_room_fan') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.living_room_fan
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.living_room_fan
      - name: "Master Bedroom Fan"
        unique_id: master_bedroom_fan
        state: "{{ states('input_boolean.master_bedroom_fan') }}"
        turn_on:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.master_bedroom_fan
        turn_off:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.master_bedroom_fan

  # Covers
  - cover:
      - name: "Living Room Blinds"
        unique_id: living_room_blinds
        state: "{{ 'open' if is_state('input_boolean.living_room_blinds', 'on') else 'closed' }}"
        open_cover:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.living_room_blinds
        close_cover:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.living_room_blinds
      - name: "Garage Door"
        unique_id: garage_door
        device_class: garage
        state: "{{ 'open' if is_state('input_boolean.garage_door', 'on') else 'closed' }}"
        open_cover:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.garage_door
        close_cover:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.garage_door
      - name: "Hallway Window"
        unique_id: hallway_window
        state: "{{ 'open' if is_state('input_boolean.hallway_window', 'on') else 'closed' }}"
        open_cover:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.hallway_window
        close_cover:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.hallway_window

  # Locks
  - lock:
      - name: "Front Door"
        unique_id: front_door_lock
        state: "{{ 'locked' if is_state('input_boolean.front_door_lock', 'on') else 'unlocked' }}"
        lock:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.front_door_lock
        unlock:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.front_door_lock
      - name: "Back Door"
        unique_id: back_door_lock
        state: "{{ 'locked' if is_state('input_boolean.back_door_lock', 'on') else 'unlocked' }}"
        lock:
          - action: input_boolean.turn_on
            target:
              entity_id: input_boolean.back_door_lock
        unlock:
          - action: input_boolean.turn_off
            target:
              entity_id: input_boolean.back_door_lock

  # Binary sensors
  - binary_sensor:
      - name: "Front Door"
        unique_id: front_door_contact
        device_class: door
        state: "{{ states('input_boolean.front_door_contact') }}"
      - name: "Back Door"
        unique_id: back_door_contact
        device_class: door
        state: "{{ states('input_boolean.back_door_contact') }}"
      - name: "Kitchen Window"
        unique_id: kitchen_window_contact
        device_class: window
        state: "{{ states('input_boolean.kitchen_window_contact') }}"
      - name: "Kids Room Motion"
        unique_id: kids_room_motion
        device_class: motion
        state: "{{ states('input_boolean.kids_room_motion') }}"
      - name: "Garage Motion"
        unique_id: garage_motion
        device_class: motion
        state: "{{ states('input_boolean.garage_motion') }}"

# --- Fake speakers (custom component, registers in entity registry) ---
media_player:
  - platform: dev_speakers
    speakers:
      - name: "Living Room Speaker"
        unique_id: living_room_speaker
      - name: "Kitchen Speaker"
        unique_id: kitchen_speaker
      - name: "Bedroom Speaker"
        unique_id: bedroom_speaker
      - name: "Kids Room Speaker"
        unique_id: kids_room_speaker
      - name: "Office Speaker"
        unique_id: office_speaker
