<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="768" viewBox="0 0 1280 768">
  <defs>
    <radialGradient id="bg-glow-center" cx="50%" cy="45%" r="65%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#0c1a3a"/>
      <stop offset="40%" stop-color="#091226"/>
      <stop offset="100%" stop-color="#050a16"/>
    </radialGradient>
    <radialGradient id="cyan-nebula" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#0ea5e9" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber-nebula" cx="75%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="star-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="1280" height="768" fill="url(#bg-glow-center)"/>

  <!-- Nebula layers -->
  <rect width="1280" height="768" fill="url(#cyan-nebula)"/>
  <rect width="1280" height="768" fill="url(#amber-nebula)"/>

  <!-- Subtle grid pattern - mission control style -->
  <g opacity="0.04" stroke="#38bdf8" stroke-width="0.5" fill="none">
    <line x1="0" y1="192" x2="1280" y2="192"/>
    <line x1="0" y1="384" x2="1280" y2="384"/>
    <line x1="0" y1="576" x2="1280" y2="576"/>
    <line x1="320" y1="0" x2="320" y2="768"/>
    <line x1="640" y1="0" x2="640" y2="768"/>
    <line x1="960" y1="0" x2="960" y2="768"/>
  </g>

  <!-- Scattered stars -->
  <g filter="url(#star-glow)">
    <circle cx="120" cy="80" r="1.2" fill="#e2e8f0" opacity="0.7"/>
    <circle cx="340" cy="150" r="0.8" fill="#e2e8f0" opacity="0.5"/>
    <circle cx="580" cy="60" r="1.0" fill="#e2e8f0" opacity="0.6"/>
    <circle cx="890" cy="120" r="1.4" fill="#38bdf8" opacity="0.5"/>
    <circle cx="1050" cy="90" r="0.9" fill="#e2e8f0" opacity="0.6"/>
    <circle cx="1180" cy="200" r="1.1" fill="#e2e8f0" opacity="0.5"/>
    <circle cx="200" cy="350" r="0.7" fill="#e2e8f0" opacity="0.4"/>
    <circle cx="450" cy="680" r="1.0" fill="#e2e8f0" opacity="0.5"/>
    <circle cx="780" cy="700" r="0.8" fill="#e2e8f0" opacity="0.4"/>
    <circle cx="1100" cy="600" r="1.3" fill="#38bdf8" opacity="0.4"/>
    <circle cx="100" cy="550" r="0.9" fill="#e2e8f0" opacity="0.5"/>
    <circle cx="950" cy="450" r="0.7" fill="#f59e0b" opacity="0.3"/>
    <circle cx="1200" cy="380" r="1.0" fill="#e2e8f0" opacity="0.5"/>
    <circle cx="60" cy="250" r="0.8" fill="#e2e8f0" opacity="0.6"/>
    <circle cx="700" cy="300" r="0.6" fill="#e2e8f0" opacity="0.3"/>
    <circle cx="400" cy="500" r="1.1" fill="#e2e8f0" opacity="0.4"/>
  </g>

  <!-- Horizon glow at bottom -->
  <ellipse cx="640" cy="800" rx="700" ry="180" fill="#38bdf8" opacity="0.03"/>
</svg>