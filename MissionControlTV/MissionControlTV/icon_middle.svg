<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="768" viewBox="0 0 1280 768">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ring-inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-wide">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Center glow -->
  <ellipse cx="640" cy="384" rx="280" ry="280" fill="url(#center-glow)"/>

  <!-- Outer tracking ring -->
  <circle cx="640" cy="384" r="240" fill="none" stroke="url(#ring-grad)" stroke-width="2" opacity="0.5" filter="url(#glow-soft)"/>

  <!-- Inner ring with subtle fill -->
  <circle cx="640" cy="384" r="180" fill="url(#ring-inner)" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>

  <!-- Radar sweep arc segments -->
  <g opacity="0.25" filter="url(#glow-soft)">
    <!-- Top arc -->
    <path d="M 640 144 A 240 240 0 0 1 854 264" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
    <!-- Bottom arc -->
    <path d="M 640 624 A 240 240 0 0 1 426 504" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Crosshair lines -->
  <g stroke="#38bdf8" stroke-width="0.8" opacity="0.2">
    <line x1="400" y1="384" x2="560" y2="384"/>
    <line x1="720" y1="384" x2="880" y2="384"/>
    <line x1="640" y1="144" x2="640" y2="264"/>
    <line x1="640" y1="504" x2="640" y2="624"/>
  </g>

  <!-- Tick marks around outer ring -->
  <g stroke="#38bdf8" stroke-width="1" opacity="0.3">
    <!-- N -->
    <line x1="640" y1="139" x2="640" y2="155"/>
    <!-- NE -->
    <line x1="809" y1="214" x2="800" y2="227"/>
    <!-- E -->
    <line x1="885" y1="384" x2="869" y2="384"/>
    <!-- SE -->
    <line x1="809" y1="553" x2="800" y2="540"/>
    <!-- S -->
    <line x1="640" y1="629" x2="640" y2="613"/>
    <!-- SW -->
    <line x1="471" y1="553" x2="480" y2="540"/>
    <!-- W -->
    <line x1="395" y1="384" x2="411" y2="384"/>
    <!-- NW -->
    <line x1="471" y1="214" x2="480" y2="227"/>
  </g>

  <!-- Small data readout rectangles — mission control feel -->
  <g opacity="0.15">
    <!-- Top-left readout -->
    <rect x="180" y="120" width="120" height="3" rx="1.5" fill="#38bdf8"/>
    <rect x="180" y="130" width="80" height="2" rx="1" fill="#38bdf8" opacity="0.6"/>
    <rect x="180" y="138" width="95" height="2" rx="1" fill="#38bdf8" opacity="0.4"/>

    <!-- Top-right readout -->
    <rect x="980" y="120" width="120" height="3" rx="1.5" fill="#38bdf8"/>
    <rect x="1000" y="130" width="100" height="2" rx="1" fill="#38bdf8" opacity="0.6"/>
    <rect x="990" y="138" width="110" height="2" rx="1" fill="#38bdf8" opacity="0.4"/>

    <!-- Bottom-left readout -->
    <rect x="180" y="620" width="100" height="3" rx="1.5" fill="#f59e0b"/>
    <rect x="180" y="630" width="70" height="2" rx="1" fill="#f59e0b" opacity="0.6"/>

    <!-- Bottom-right readout -->
    <rect x="1000" y="620" width="100" height="3" rx="1.5" fill="#f59e0b"/>
    <rect x="1020" y="630" width="80" height="2" rx="1" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Corner bracket decorations -->
  <g stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.2">
    <!-- Top-left -->
    <path d="M 150 100 L 150 80 L 170 80"/>
    <!-- Top-right -->
    <path d="M 1130 100 L 1130 80 L 1110 80"/>
    <!-- Bottom-left -->
    <path d="M 150 668 L 150 688 L 170 688"/>
    <!-- Bottom-right -->
    <path d="M 1130 668 L 1130 688 L 1110 688"/>
  </g>

  <!-- Small diamond markers on the ring - active targets -->
  <g filter="url(#glow-soft)">
    <rect x="636" y="140" width="8" height="8" rx="1" fill="#f59e0b" opacity="0.8" transform="rotate(45 640 144)"/>
    <rect x="876" y="380" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.7" transform="rotate(45 880 384)"/>
    <rect x="466" y="540" width="6" height="6" rx="1" fill="#34d399" opacity="0.7" transform="rotate(45 469 543)"/>
  </g>

  <!-- Pulsing dot at center -->
  <circle cx="640" cy="384" r="4" fill="#38bdf8" opacity="0.6" filter="url(#glow-strong)"/>
  <circle cx="640" cy="384" r="2" fill="#ffffff" opacity="0.9"/>
</svg>